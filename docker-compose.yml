services:
  cycling-coach:
    build: .
    container_name: cycling-coach
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - coach-data:/data
    env_file:
      - .env

  wyze-sidecar:
    build:
      context: ./wyze_sidecar
    container_name: wyze-sidecar
    restart: unless-stopped
    env_file:
      - .env

volumes:
  coach-data:
